<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Core Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        label { display: block; margin: 15px 0 5px; color: var(--primary-blue); font-weight: bold; }
        input[type="text"], input[type="password"], textarea { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color); color: #fff; 
            font-family: monospace; border-radius: 4px; box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: var(--primary-green); outline: none; }
        button { 
            background: transparent; border: 1px solid var(--primary-green); 
            color: var(--primary-green); padding: 10px 20px; margin-top: 15px; 
            cursor: pointer; font-family: monospace; font-weight: bold;
        }
        button:hover { background: rgba(57, 255, 20, 0.1); }
    </style>
</head>
<body>
    <div style="max-width: 700px; margin: 50px auto; padding: 20px;">
        <h1 class="brand-text">>_ SYSTEM_CONTROL_PANEL</h1>
        <a href="/" style="color: var(--primary-green); text-decoration: none;">[<- Back to Site Portal]</a>

        <div class="terminal-window" style="padding: 25px; margin-top: 20px; border-radius: 6px;">
            <div class="accent-text" style="font-weight: bold; margin-bottom: 15px;">[01] EDIT MAIN BIO VARIABLES</div>
            <form action="/admin" method="POST">
                <label>Profile Name:</label>
                <input type="text" name="name" value="{{ data.name }}">

                <label>Headline Roles:</label>
                <input type="text" name="title" value="{{ data.title }}">

                <label>System Description (Bio):</label>
                <textarea name="bio" rows="5">{{ data.bio }}</textarea>

                <label style="color: #ff3333; margin-top:20px;">Master Security Access Token:</label>
                <input type="HADI" name="@4560082010" required placeholder="Enter password to confirm overwrite...">

                <button type="submit">COMMIT TEXT CHANGES</button>
            </form>
        </div>
    </div>
</body>
</html>
